<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something is Coming...</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #000, #021b12);
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    text-align: center;
}

.container {
    margin-top: 80px;
}

#timer {
    font-size: 2rem;
    margin: 10px 0;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 20px;
    border-radius: 15px;
    border: none;
    background: #00ff9f;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

#lockedMsg {
    margin-top: 15px;
    display: none;
}

/* CHARACTER STYLE */
.charBox {
    position: absolute;
    width: 120px;
    text-align: center;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.5s ease;
}

.top-left { top: 10px; left: 10px; position:absolute; }
.top-right { top: 10px; right: 10px; position:absolute; }
.bottom-left { bottom: 10px; left: 10px; position:absolute; }
.bottom-right { bottom: 10px; right: 10px; position:absolute; }
}

.left { left: 10px; }
.right { right: 10px; }

.charBox img {
    width: 100%;
}

.bubble {
    background: white;
    color: black;
    padding: 6px;
    border-radius: 10px;
    font-size: 0.75rem;
    margin-bottom: 5px;
}

.show {
    opacity: 1;
    transform: scale(1);
}
</style>
</head>

<body>

<div class="container">
    <h2>Something special is coming 💚</h2>
    <div id="timer"></div>

    <input type="password" id="pass" placeholder="Enter secret code">
    <br>
    <button onclick="checkPass()">Try Unlock</button>

    <div id="lockedMsg">
        Work in progress 🚧<br>
        If you're too curious... contact creator 😉<br><br>
        📞 +91 9671534184 
    </div>
</div>

<!-- CHARACTERS -->
<div id="leftChar" class="charBox left">
    <div class="bubble" id="leftText"></div>
    <img id="leftImg">
</div>

<div id="rightChar" class="charBox right">
    <div class="bubble" id="rightText"></div>
    <img id="rightImg">
</div>

<script>
// 🎂 DATE
let targetDate = new Date("2026-04-15T00:01:00").getTime();

// PASSWORD
let correctPass = "ilyishu";

// attempt system
let today = new Date().toDateString();
let stored = JSON.parse(localStorage.getItem("attemptData")) || {};

if (!stored.date || stored.date !== today) {
    stored = { date: today, attempts: 0 };
}

// ⏳ TIMER
setInterval(() => {
    let now = new Date().getTime();
    let dist = targetDate - now;

    if (dist <= 0) {
        window.location.href = "scene1.html";
        return;
    }

    let d = Math.floor(dist / (1000*60*60*24));
    let h = Math.floor((dist % (1000*60*60*24))/(1000*60*60));
    let m = Math.floor((dist % (1000*60*60))/(1000*60));
    let s = Math.floor((dist % (1000*60))/1000);

    document.getElementById("timer").innerHTML =
        d+"d "+h+"h "+m+"m "+s+"s";
}, 1000);

// 🔐 PASSWORD LOGIC
function checkPass() {

    document.getElementById("lockedMsg").style.display = "block";

    if (stored.attempts >= 5) {
        document.getElementById("lockedMsg").innerHTML =
        "⛔ Too many attempts today.<br>Try again tomorrow 😉";
        return;
    }

    let input = document.getElementById("pass").value;

    stored.attempts++;
    localStorage.setItem("attemptData", JSON.stringify(stored));

    if (input === correctPass) {
        document.getElementById("lockedMsg").innerHTML =
        "👀 You found the code...<br><br>" +
        "But it's still under construction 🚧<br>" +
        "Wait till the right time 💚";
    } else {
        const wrongMsgs = [
    "😏 not that easy...",
    "👀 trying hard huh?",
    "🙄 nope… try again",
    "😜 almost… but not really",
    "💀 bro thinks he guessed it",
    "🥺 wrong again… but cute try",
    "😎 nah… do better"
];
     let msg = wrongMsgs[Math.floor(Math.random() * wrongMsgs.length)];

    document.getElementById("lockedMsg").innerHTML =
        msg + "<br>Attempts left: " + (5 - stored.attempts);
    }

// 🎭 CHARACTER SYSTEM
const scenes = [
    {char:"luffy", text:"Hehe… I know you're curious 😏"},
    {char:"naruto", text:"Oi! Don’t rush it! 😄"},
    {char:"zoro", text:"Tch… patience."},
    {char:"gojo", text:"Relax… worth it 😉"},
    {char:"senku", text:"10 billion percent special."},
    {char:"levi", text:"Make it count."},

    {char:"luffy", text:"It’s for someone important 💚"},
    {char:"naruto", text:"You’ll smile for sure!"},
    {char:"gojo", text:"Trust the process 😌"},
    {char:"senku", text:"Calculated surprise."},
    {char:"zoro", text:"Just wait."},
    {char:"levi", text:"Timing matters."}
];

const images = {
    luffy:"luffy.png",
    zoro:"zoro.png",
    senku:"senku.png",
    naruto:"naruto.png",
    gojo:"gojo.png",
    levi:"levi.png"
};

let i = 0;

function showScene() {
    function showScene() {
    let box = document.createElement("div");
    box.className = "charBox show";

    let positions = ["top-left","top-right","bottom-left","bottom-right"];
    let pos = positions[Math.floor(Math.random()*positions.length)];
    box.classList.add(pos);

    let s = scenes[i];

    box.innerHTML = `
        <div class="bubble">${s.text}</div>
        <img src="${images[s.char]}">
    `;

    document.body.appendChild(box);

    setTimeout(() => {
        box.remove();
    }, 2500);

    i = (i + 1) % scenes.length;
}

setInterval(showScene, 3000);
showScene();
</script>

</body>
</html>
