<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something Special 💚</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    text-align: center;
    background: linear-gradient(-45deg, #000000, #021b12, #001a1a, #000000);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
}

@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    margin-top: 80px;
    z-index: 2;
    position: relative;
}

#timer {
    font-size: 2rem;
    margin: 15px 0;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 20px;
    border-radius: 15px;
    border: none;
    background: #00ff9f;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

#lockedMsg {
    margin-top: 15px;
    display: none;
}

/* CHARACTER */
.charBox {
    position: absolute;
    width: 110px;
    text-align: center;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.5s ease;
}

.show {
    opacity: 1;
    transform: scale(1);
}

.charBox img {
    width: 100%;
}

.bubble {
    background: white;
    color: black;
    padding: 6px;
    border-radius: 10px;
    font-size: 0.7rem;
    margin-bottom: 5px;
}

/* positions */
.top-left { top: 10px; left: 10px; }
.top-right { top: 10px; right: 10px; }
.bottom-left { bottom: 10px; left: 10px; }
.bottom-right { bottom: 10px; right: 10px; }

/* particles */
.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #00ff9f;
    border-radius: 50%;
    opacity: 0.6;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="container">
    <h2>Something special is coming 💚</h2>
    <div id="timer"></div>

    <input type="password" id="pass" placeholder="Enter secret code">
    <br>
    <button onclick="checkPass()">Try Unlock</button>

    <div id="lockedMsg">
        Work in progress 🚧<br>
        If you're too curious... contact creator 😉
    </div>
</div>

<script>
// 🎂 DATE
let targetDate = new Date("2026-04-15T00:01:00").getTime();

// PASSWORD
let correctPass = "secret123";

// attempts
let today = new Date().toDateString();
let stored = JSON.parse(localStorage.getItem("attemptData")) || {};

if (!stored.date || stored.date !== today) {
    stored = { date: today, attempts: 0 };
}

// TIMER
setInterval(() => {
    let now = new Date().getTime();
    let dist = targetDate - now;

    if (dist <= 0) {
        window.location.href = "scene1.html";
        return;
    }

    let d = Math.floor(dist / (1000*60*60*24));
    let h = Math.floor((dist % (1000*60*60*24))/(1000*60*60));
    let m = Math.floor((dist % (1000*60*60))/(1000*60));
    let s = Math.floor((dist % (1000*60))/1000);

    document.getElementById("timer").innerHTML =
        d+"d "+h+"h "+m+"m "+s+"s";
}, 1000);

// PASSWORD
function checkPass() {

    document.getElementById("lockedMsg").style.display = "block";

    if (stored.attempts >= 5) {
        document.getElementById("lockedMsg").innerHTML =
        "⛔ Too many attempts today.<br>Try tomorrow 😉";
        return;
    }

    let input = document.getElementById("pass").value;

    stored.attempts++;
    localStorage.setItem("attemptData", JSON.stringify(stored));

    if (input === correctPass) {
        document.getElementById("lockedMsg").innerHTML =
        "👀 You found the code...<br><br>Still under construction 🚧<br>Wait 💚";
    } else {

        const wrongMsgs = [
            "😏 not that easy...",
            "👀 trying hard huh?",
            "🙄 nope… try again",
            "😜 almost… but not really",
            "💀 bro thinks he guessed it",
            "🥺 wrong again… cute try",
            "😎 nah… do better"
        ];

        let msg = wrongMsgs[Math.floor(Math.random()*wrongMsgs.length)];

        document.getElementById("lockedMsg").innerHTML =
            msg + "<br>Attempts left: " + (5 - stored.attempts);
    }
}

// 🎭 CHARACTERS
const scenes = [
    {char:"luffy", text:"Hehe… I know you're curious 😏"},
    {char:"naruto", text:"Oi! wait for it! 😄"},
    {char:"zoro", text:"Tch… patience."},
    {char:"gojo", text:"Relax… it's worth it 😉"},
    {char:"senku", text:"10 billion percent special."},
    {char:"levi", text:"Make it count."}
];

const images = {
    luffy:"luffy.png",
    zoro:"zoro.png",
    senku:"senku.png",
    naruto:"naruto.png",
    gojo:"gojo.png",
    levi:"levi.png"
};

let i = 0;

function showScene() {
    let box = document.createElement("div");
    box.className = "charBox show";

    let positions = ["top-left","top-right","bottom-left","bottom-right"];
    let pos = positions[Math.floor(Math.random()*positions.length)];
    box.classList.add(pos);

    let s = scenes[i];

    box.innerHTML = `
        <div class="bubble">${s.text}</div>
        <img src="${images[s.char]}">
    `;

    document.body.appendChild(box);

    setTimeout(() => {
        box.remove();
    }, 2500);

    i = (i + 1) % scenes.length;
}

setInterval(showScene, 3000);

// ✨ PARTICLES
setInterval(() => {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random()*100 + "vw";
    document.body.appendChild(p);

    setTimeout(() => p.remove(), 6000);
}, 200);
</script>

</body>
</html>
