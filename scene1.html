<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Episode 1</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* center text */
.center {
    position: absolute;
    top: 50%;
    width: 100%;
    text-align: center;
    transform: translateY(-50%);
}

/* fade animation */
.fade {
    opacity: 0;
    animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* title */
.title {
    font-size: 2rem;
    letter-spacing: 3px;
}

/* subtitle */
.sub {
    margin-top: 10px;
    font-size: 1rem;
    opacity: 0.7;
}

/* button */
button {
    margin-top: 30px;
    padding: 12px 25px;
    border-radius: 20px;
    border: none;
    background: #00ff9f;
    font-weight: bold;
    cursor: pointer;
}

/* glow line */
.line {
    width: 0%;
    height: 2px;
    background: #00ff9f;
    margin: 20px auto;
    animation: expand 2s forwards;
}

@keyframes expand {
    to { width: 60%; }
}
</style>
</head>

<body>

<div class="center">
    <div id="ep" class="title fade">EPISODE 1</div>
    <div class="line"></div>
    <div id="title" class="title" style="opacity:0;">The Surprise Begins</div>
    <div id="sub" class="sub" style="opacity:0;">
        Some moments don’t need noise… just meaning.
    </div>

    <button id="nextBtn" style="display:none;" onclick="nextScene()">
        Continue →
    </button>
</div>

<script>
// sequence timing
setTimeout(() => {
    document.getElementById("title").style.opacity = 1;
}, 2000);

setTimeout(() => {
    document.getElementById("sub").style.opacity = 1;
}, 3500);

setTimeout(() => {
    document.getElementById("nextBtn").style.display = "inline-block";
}, 5000);

// next page
function nextScene() {
    window.location.href = "scene2.html";
}
</script>

</body>
</html>
